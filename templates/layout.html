<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static',filename='css/bootstrap.min.css')}}">

<title>{% block titulo %}DreamyBunny{% endblock %}</title>

<style>

/* 🌸 ===== MODAL KAWAII COMPLETO ===== */

/* CONTENEDOR */
.modal-content{
  border-radius:20px;
  background:#fde4ee;
  border:none;
}

/* TÍTULO */
.modal-header h5{
  color:#f48fb1;
  font-family:'porkys';
}

/* TEXTO GENERAL */
.modal-body{
  color:#6a1b9a;
}

/* LABELS */
.modal-body label{
  color:#ec6f9e;
  font-family:'porkys';
}

/* INPUTS */
.modal-body input{
  border-radius:15px;
  border:2px solid #f8bbd0;
  color:#6a1b9a;
}

/* EFECTO AL ESCRIBIR */
.modal-body input:focus{
  border-color:#f48fb1;
  box-shadow:0 0 6px #f48fb1;
}

/* PLACEHOLDER */
.modal-body input::placeholder{
  color:#f8a5c2;
}

/* 💖 BOTONES */
.modal-footer .btn{
  border-radius:25px;
  font-family:'porkys';
  padding:8px 20px;
  transition: all 0.3s ease;
}

/* BOTÓN PRINCIPAL */
.modal-footer .btn-primary{
  background:#f48fb1;
  border:none;
  color:white;
}

.modal-footer .btn-primary:hover{
  background:#ec6f9e;
  transform:scale(1.05);
}

/* BOTÓN SECUNDARIO */
.modal-footer .btn-secondary{
  background:#8fffe6;
  border:none;
  color:white;
}

.modal-footer .btn-secondary:hover{
  background: #8fffe6;
  transform:scale(1.05);
}

/* 💌 MENSAJES DE ERROR */
.alert{
  background:#f8bbd0;
  color:#880e4f;
  border:none;
  border-radius:15
}

/* ❌ X ROSA FUERTE PERSONALIZADA */
.btn-close{
  background-image: none;
  opacity: 1;
  position: relative;
}

.btn-close::before{
  content: "✕";
  font-size:20px;
  color:#f48fb1;
}

/* ✨ HOVER DE LA X */
.btn-close:hover::before{
  color:#ec407a;
  transform:scale(1.2);
}

/* ===== FUENTES ===== */
@font-face {
  font-family: 'porkys';
  src: url("{{ url_for('static',filename='font/porky.ttf')}}");
}

@font-face {
  font-family: 'cream';
  src: url("{{ url_for('static',filename='font/cream.ttf')}}");
}

/* ===== BODY ===== */
body{
  margin:0;
  font-family:'cream';
  background: linear-gradient(180deg,#cfe9e9,#f8cdda);
}

/* ===== HEADER CONTENEDOR ===== */
.header-container{
  position:relative;
  padding-top:100px;
}

/* ===== LOGO FLOTANTE (EFECTO JUEGO) ===== */
.logo{
  position:absolute;
  top:-30px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
  z-index:10;

  animation: floatGame 2.5s ease-in-out infinite;
}

/* 🎮 animación suave */
@keyframes floatGame {
  0%   { transform: translate(-50%, 0px); }
  50%  { transform: translate(-50%, -12px); }
  100% { transform: translate(-50%, 0px); }
}

/* ===== NAVBAR ===== */

.menu-bar a,
.menu-bar .btn-registro{
  display:inline-block;
  animation: jumpGame 1.8s ease-in-out infinite;
}

@keyframes jumpGame {
  0%   { transform: translateY(0px); }
  20%  { transform: translateY(-4px); }
  40%  { transform: translateY(0px); }
  60%  { transform: translateY(-3px); }
  80%  { transform: translateY(0px); }
  100% { transform: translateY(0px); }
}

.menu-bar{
  background:#f48fb1;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:25px;
  padding:15px;
  border-radius:0 0 25px 25px;
}

.menu-bar a{
  text-decoration:none;
  color:white;
  font-family:'porkys';
  font-size:22px;
}

.btn-iniciar-sesion{
  background:#eee !important;
  color:#f48fb1 !important;
  padding:8px 15px; /* 👈 igual que registro */
  border-radius:30px !important;
  font-family:'porkys';
  border:none;
  text-decoration:none !important;
  display:inline-block;
  font-size:5x; /* 👈 AJUSTA esto si sigue grande */
}
.btn-registro{
  background:#eee;
  color:#f48fb1;
  padding:10px 25px;
  border-radius:30px;
  font-family:'porkys';
  border:none;
}


/* ===== CONTENEDOR ===== */
.contenedor{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:40px;
  background:#d1c4e9;
  padding:40px;
  border-radius:30px;
  max-width:1100px;
  margin:80px auto;
  border:15px solid #f5f5f5;
}

/* TEXTO */
.texto{
  width:50%;
}

h2{
  font-family:'porkys';
  color:#f48fb1;
  font-size:42px;
}

/* CARRUSEL */
.carrusel{
  width:40%;
}

.carousel img{
  border-radius:20px;
}

/* MODAL */
.modal-content{
  border-radius:20px;
  background:#fde4ee;
}

</style>
</head>

<body>

<div class="header-container">

<!-- ✅ LOGO -->
<img src="{{ url_for('static', filename='img/logo.png') }}" class="logo" alt="logo">

<!-- ✅ NAVBAR -->


<nav class="menu-bar">
  <a href="#quienes">¿Quiénes somos?</a>
  <a href="#reservas">Reservaciones</a>
  <a href="#bunnys">Bunnys</a>
  <a href="#menu">Menú</a>
  <a href="#reglas">Reglas</a>

  <button class="btn-registro" data-bs-toggle="modal" data-bs-target="#signinModal">
  Iniciar sesión
</button>

  <button class="btn-registro" data-bs-toggle="modal" data-bs-target="#signupModal">
    Regístrate
  </button>


</nav>



<!-- 🔽 CONTENIDO DINÁMICO -->
{% block contenido %}{% endblock %}

</div>

<!-- ✅ MODAL (solo uno, global) -->
<div class="modal fade" id="signupModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Registro</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form action="/signup" method="POST">
        <div class="modal-body">

          <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre">
          <input type="email" name="correo" class="form-control mb-2" placeholder="Correo">
          <input type="password" name="clave" class="form-control mb-2" placeholder="Contraseña">

        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Crear cuenta</button>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="{{ url_for('static',filename='js/bootstrap.bundle.min.js')}}"></script>

</body>
</html>
