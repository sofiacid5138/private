<!-- templates/layout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static',filename='/css/bootstrap.min.css')}}">
    <title>DreamyBunny</title>

    <style>

    @font-face {
      font-family: 'porkys';
      src: url("{{ url_for('static',filename='font/porky.ttf')}}") format('truetype');
    }

    body {
      margin:0;
      min-height:100vh;
      background: linear-gradient(250deg,#f8cdda,#fde4ee);
    }

    /* ===== HEADER CONTENEDOR ===== */
    .header-container{
      position:relative;
      padding-top:90px; /* espacio para logo */
    }

    /* ===== LOGO (solo logo, no todas las img) ===== */
    .logo{
      position:absolute;
      top:-30px;
      left:50%;
      transform:translateX(-50%);
      width:100px; /* más pequeño */
      z-index:10;
    }

    /* ===== NAVBAR ===== */
    nav.navbar{
      margin-top:20px; /* ya no exagerado */
    }

    /* ===== secciones ===== */
    section {
      margin: 90px auto;
      padding: 45px;
      max-width: 950px;
      border-radius: 40px;
    }

    </style>
</head>

<body>

<div class="header-container">

  <!-- LOGO CENTRADO -->
  <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo">

  {% block contenido %}{% endblock %}

</div>

<script src="{{ url_for('static',filename='/js/bootstrap.bundle.min.js')}}"></script>

</body>
</html>
